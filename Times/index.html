<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <div id="Categories" style="width: 50%; max-width: 800px; margin: 0 auto;">
    <div class="header">
      <h1>Support clocks</h1>
    </div>
  <table style="width: 100%;" cellspacing="0" cellpadding="6">
    <tr><td>
      <div class="clock-item"><span class="location">Japan (Tokyo):</span> <span id="jp-time" class="time"></span></div>
      <div class="clock-item"><span class="location">Hong Kong:</span> <span id="hk-time" class="time"></span></div>
      <div class="clock-item"><span class="location">India:</span> <span id="india-time" class="time"></span></div>
      <div class="clock-item"><span class="location">Pakistan:</span> <span id="pakistan-time" class="time"></span></div>
      <div class="clock-item"><span class="location">Israel:</span> <span id="israel-time" class="time"></span></div>
      <div class="clock-item"><span class="location">Ukraine:</span> <span id="ukraine-time" class="time"></span></div>
      <div class="clock-item"><span class="location">UK (London):</span> <span id="uk-time" class="time"></span></div>
      <div class="clock-item"><span class="location">New York (Eastern):</span> <span id="ny-time" class="time"></span></div>
      <div class="clock-item"><span class="location">Chicago (Central):</span> <span id="chicago-time" class="time"></span></div>
      <div class="clock-item"><span class="location">San Francisco (Western):</span> <span id="sf-time" class="time"></span></div>
    </td></tr>
  </table>
  <script src="clocks.js"></script>
</body>
</html>
